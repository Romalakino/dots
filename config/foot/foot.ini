# Foot terminal config — Monochrome

term=xterm-256color
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=12x12
initial-color-theme=dark

[cursor]
style=beam
beam-thickness=2
unfocused-style=none

[mouse]
hide-when-typing=yes

[colors-dark]
background=000000
foreground=ffffff
alpha=0.9
regular0=333333
regular1=ffffff
regular2=ffffff
regular3=ffffff
regular4=ffffff
regular5=ffffff
regular6=ffffff
regular7=cccccc
bright0=555555
bright1=ffffff
bright2=ffffff
bright3=ffffff
bright4=ffffff
bright5=ffffff
bright6=ffffff
bright7=ffffff
